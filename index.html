<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool App</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:90%;
            max-width:400px;
            background:#1e293b;
            border-radius:15px;
            padding:30px;
            text-align:center;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-size:18px;
        }

        h1{
            margin-top:0;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎉 Pool App</h1>

    <p>Join pools. Win cash. Fair random draws.</p>

    <button onclick="alert('Login page coming next')">
        Login
    </button>

    <button onclick="alert('Register page coming next')">
        Register
    </button>

</div>

</body>
</html>
